name: AgriLink CI - Regression Tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: maven

      - name: Fix SSL trust store
        run: |
          JAVA_SEC=$JAVA_HOME/conf/security/java.security
          sudo sed -i 's/^securerandom.source=.*/securerandom.source=file:\/dev\/urandom/' $JAVA_SEC || true
          sudo update-ca-certificates --fresh || true

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run all tests
        run: ./mvnw test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          if-no-files-found: warn

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agrilink-jar
          path: target/*.jar
          if-no-files-found: warn
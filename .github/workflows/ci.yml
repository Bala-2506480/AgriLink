name: AgriLink CI - Regression Tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix SSL certificates
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates --fresh
          sudo rm -f /etc/ssl/certs/java/cacerts
          sudo update-ca-certificates

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Regenerate Java cacerts
        run: |
          JAVA_CACERTS=$JAVA_HOME/lib/security/cacerts
          sudo rm -f $JAVA_CACERTS
          sudo keytool -importkeystore \
            -srckeystore /etc/ssl/certs/java/cacerts \
            -destkeystore $JAVA_CACERTS \
            -srcstorepass changeit \
            -deststorepass changeit \
            -noprompt 2>/dev/null || true
          sudo chmod 644 $JAVA_CACERTS

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run all tests
        run: ./mvnw test -Djavax.net.ssl.trustStore=$JAVA_HOME/lib/security/cacerts -Djavax.net.ssl.trustStorePassword=changeit

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          if-no-files-found: warn

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix SSL certificates
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates --fresh
          sudo rm -f /etc/ssl/certs/java/cacerts
          sudo update-ca-certificates

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Regenerate Java cacerts
        run: |
          JAVA_CACERTS=$JAVA_HOME/lib/security/cacerts
          sudo rm -f $JAVA_CACERTS
          sudo keytool -importkeystore \
            -srckeystore /etc/ssl/certs/java/cacerts \
            -destkeystore $JAVA_CACERTS \
            -srcstorepass changeit \
            -deststorepass changeit \
            -noprompt 2>/dev/null || true
          sudo chmod 644 $JAVA_CACERTS

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw package -DskipTests -Djavax.net.ssl.trustStore=$JAVA_HOME/lib/security/cacerts -Djavax.net.ssl.trustStorePassword=changeit

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agrilink-jar
          path: target/*.jar
          if-no-files-found: warn
name: AgriLink CI - Regression Tests

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run all tests
        run: ./mvnw test
        env:
          JAVA_TOOL_OPTIONS: -Djava.security.egd=file:/dev/./urandom -Dhttps.protocols=TLSv1.2

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw package -DskipTests
        env:
          JAVA_TOOL_OPTIONS: -Djava.security.egd=file:/dev/./urandom -Dhttps.protocols=TLSv1.2

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agrilink-jar
          path: target/*.jar
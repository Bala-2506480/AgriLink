name: AgriLink CI - Build Only (No Tests)

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Project (Skip Tests)
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Fix SSL (VERY IMPORTANT ✅)
      - name: Fix SSL certificates
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates
          sudo update-ca-certificates --fresh
          sudo rm -f /etc/ssl/certs/java/cacerts
          sudo update-ca-certificates

      # ✅ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ✅ Regenerate Java cacerts (IMPORTANT ✅)
      - name: Regenerate Java cacerts
        run: |
          JAVA_CACERTS=$JAVA_HOME/lib/security/cacerts
          sudo rm -f $JAVA_CACERTS
          sudo keytool -importkeystore \
            -srckeystore /etc/ssl/certs/java/cacerts \
            -destkeystore $JAVA_CACERTS \
            -srcstorepass changeit \
            -deststorepass changeit \
            -noprompt 2>/dev/null || true
          sudo chmod 644 $JAVA_CACERTS

      # ✅ Make Maven executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      # ✅ Build without tests ✅
      - name: Build project (skip tests)
        run: |
          ./mvnw clean install -DskipTests \
          -Djavax.net.ssl.trustStore=$JAVA_HOME/lib/security/cacerts \
          -Djavax.net.ssl.trustStorePassword=changeit

      # ✅ Upload JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agrilink-jar
          path: target/*.jar
          if-no-files-found: warn
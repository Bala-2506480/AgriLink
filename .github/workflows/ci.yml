name: AgriLink CI - Build Only (No Tests)

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Project (Skip Tests)
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ✅ Make mvnw executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      # ✅ Build project (skip tests)
      - name: Build project
        run: ./mvnw clean install -DskipTests

      # ✅ Upload JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agrilink-jar
          path: target/*.jar
# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/agrilink
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=validate   
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ? REMOVE THIS (optional but recommended)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# JWT CONFIG
# =========================
jwt.secret=agrilink_super_secret_key_2026_cts_256bit_ok
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

# =========================
# SERVER
# =========================
server.port=8081
spring.application.name=agrilink

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
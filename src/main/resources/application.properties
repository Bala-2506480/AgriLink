spring.datasource.url=jdbc:mysql://localhost:3306/agrilink
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Secret must be at least 256 bits (32 characters) for HS256
jwt.secret=agrilink_super_secret_key_2026_cts_256bit_ok
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

server.port=8081
spring.application.name=agrilink

# Example fallback configuration variable for your WebClient setup
iam.service.url=http://localhost:8089
spring.devtools.restart.enabled=false
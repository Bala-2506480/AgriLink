spring.application.name=agrilink
spring.datasource.url = jdbc:mysql://localhost:3306/agrilink
spring.datasource.username = root
spring.datasource.password =root

spring.jpa.show = true
spring.jpa.generate-ddl = true
spring.jpa.hibernate.ddl.auto = update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.port = 8088

# Session refresh-token validity in milliseconds (7 days)
app.refresh-token-expiry-ms=604800000

# ---- Logging (SLF4J over Logback, bundled with Spring Boot) ----
# Application packages log at DEBUG; everything else stays at INFO.
logging.level.root=INFO
logging.level.com.cts.agrilink=DEBUG
# Console log line format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
# Also write logs to a rolling file under ./logs
logging.file.name=logs/agrilink.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

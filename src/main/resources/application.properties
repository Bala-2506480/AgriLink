spring.application.name=agrilink

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/agri_module2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8083

# Context path
server.servlet.context-path=/agriLink

# JWT
jwt.secret=agriLinkSuperSecretKey2024XYZabcdefghijklmnopqrstuvwxyz1234567890AB
jwt.expiration=86400000